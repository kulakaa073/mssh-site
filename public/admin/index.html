<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Admin</title>

  <!-- Stop automatic init -->
  <script>window.CMS_MANUAL_INIT = true;</script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js"></script>

</head>
<body>
  <script>
    // --- Inline Ukrainian transliteration ---
    function transliterate(str) {
      const map = {
        А:'A', Б:'B', В:'V', Г:'H', Ґ:'G', Д:'D', Е:'E', Є:'Ye', Ж:'Zh', З:'Z',
        И:'Y', І:'I', Ї:'Yi', Й:'Y', К:'K', Л:'L', М:'M', Н:'N', О:'O', П:'P',
        Р:'R', С:'S', Т:'T', У:'U', Ф:'F', Х:'Kh', Ц:'Ts', Ч:'Ch', Ш:'Sh', Щ:'Shch',
        Ю:'Yu', Я:'Ya', а:'a', б:'b', в:'v', г:'h', ґ:'g', д:'d', е:'e', є:'ye',
        ж:'zh', з:'z', и:'y', і:'i', ї:'yi', й:'y', к:'k', л:'l', м:'m', н:'n',
        о:'o', п:'p', р:'r', с:'s', т:'t', у:'u', ф:'f', х:'kh', ц:'ts', ч:'ch',
        ш:'sh', щ:'shch', ю:'yu', я:'ya', ь:'', ' ':'-'
      };
      return str.split('').map(c => map[c] || c).join('');
    }

    // --- Pre-save handler for auto slug (no collisions check) ---
    CMS.registerEventListener({
      name: 'preSave',
      handler: ({ entry }) => {
        const title = entry.getIn(['data', 'title']);
        let slug = entry.getIn(['data', 'slug']);

        if (!title) return entry;

        // Only generate slug on first save
        if (!slug || slug.trim() === '') {
          const baseSlug = transliterate(title)
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/(^-|-$)/g, '');

          entry = entry.setIn(['data', 'slug'], baseSlug);
        }

        return entry;
      }
    });

    // --- Initialize CMS ---
    CMS.init();
  </script>
</body>
</html>
