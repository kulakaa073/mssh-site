local_backend: true

backend:
  name: github
  repo: dummy/dummy # required but ignored locally
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

locale: 'uk'

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "history"
    label: "History"
    folder: "src/content/about-school/history"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Body"
        name: "body"
        widget: "markdown"

  - name: "workers"
    label: "Workers"
    folder: "src/content/about-school/workers"
    media_folder: "public/uploads/workers/{{fields.category}}/{{slug}}"
    public_folder: "/uploads/workers/{{fields.category}}/{{slug}}"
    create: true
    slug: "{{fields.Name}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Name"
        name: "Name"
        widget: "string"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Education"
        name: "education"
        widget: "markdown"
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Photo"
        name: "photo"
        widget: "image"
      - label: "Category"
        name: "category"
        widget: "string"
      - label: "Order"
        name: "order"
        widget: "number"
        default: 0
        required: false

  - name: "documents"
    label: "Documents"
    folder: "src/content/public-info/documents"
    media_folder: "public/uploads/documents/{{fields.category}}/{{fields.subcategory}}/{{slug}}"
    public_folder: "/uploads/documents/{{fields.category}}/{{fields.subcategory}}/{{slug}}"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "document-categories"
        search_fields: ["title"]
        value_field: "slug"
        display_fields: ["title"]
        required: false
      - label: "Subcategory"
        name: "subcategory"
        widget: "relation"
        collection: "document-subcategories"
        search_fields: ["title"]
        value_field: "slug"
        display_fields: ["title"]
        required: false
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
      - label: "Featured Image"
        name: "thumbnail"
        widget: "image"
        required: false
      - label: "Upload Document (PDF, DOCX)"
        name: "document"
        widget: "file"
        hint: "Max 10MB. Do NOT upload videos."
        media_library:
          allow_multiple: false

  - name: "events"
    label: "Events"
    folder: "src/content/educational-process/events"
    media_folder: "public/uploads/events/{{fields.category}}/{{slug}}"
    public_folder: "/uploads/events/{{fields.category}}/{{slug}}"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
        required: false
      - label: "Date"
        name: "date"
        widget: "datetime"
        date_format: "DD-MM-YYYY"
        time_format: false
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "event-categories"
        search_fields: ["title"]
        value_field: "slug"
        display_fields: ["title"]
        required: false

      - label: "Sections"
        name: "sections"
        widget: "list"
        types:
        # 1️⃣ Markdown Text Block
        - label: "Markdown Text"
          name: "markdown"
          widget: "object"
          fields:
            - label: "Content"
              name: "content"
              widget: "markdown"
        # 2️⃣ Video Block
        - label: "Video"
          name: "video"
          widget: "object"
          fields:
            - label: "Video URL (YouTube/Vimeo)"
              name: "url"
              widget: "string"
            - label: "Caption"
              name: "caption"
              widget: "string"
              required: false
        # 3️⃣ Single Image
        - label: "Single Image"
          name: "image"
          widget: "object"
          fields:
            - label: "Image"
              name: "image"
              widget: "image"
            - label: "Alt Text"
              name: "alt"
              widget: "string"
            - label: "Caption"
              name: "caption"
              widget: "string"
              required: false
        # 4️⃣ Gallery
        - label: "Gallery"
          name: "gallery"
          widget: "object"
          fields:
            - label: "Images"
              name: "images"
              widget: "list"
              field:
                label: "Image"
                name: "image"
                widget: "image"
        # 5️⃣ Slider Gallery
        - label: "Slider Gallery"
          name: "slider"
          widget: "object"
          fields:
            - label: "Slides"
              name: "slides"
              widget: "list"
              fields:
                - label: "Image"
                  name: "image"
                  widget: "image"
                - label: "Caption"
                  name: "caption"
                  widget: "string"
                  required: false
        # 6️⃣ Carousel (Image + Title + Text + Link)
        - label: "Carousel"
          name: "carousel"
          widget: "object"
          fields:
            - label: "Items"
              name: "items"
              widget: "list"
              fields:
                - label: "Image"
                  name: "image"
                  widget: "image"
                - label: "Title"
                  name: "title"
                  widget: "string"
                - label: "Text"
                  name: "text"
                  widget: "text"
                - label: "Link"
                  name: "link"
                  widget: "string"
                  required: false

  - name: "document-categories"
    label: "Document Categories"
    folder: "src/content/public-info/document-categories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
      - label: "Order"
        name: "order"
        widget: "number"
        default: 0
        required: false

  - name: "document-subcategories"
    label: "Document Subcategories"
    folder: "src/content/public-info/document-subcategories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
      - label: "Parent Category"
        name: "parentCategory"
        widget: "relation"
        collection: "document-categories"
        search_fields: ["title"]
        value_field: "slug"
        display_fields: ["title"]
        required: false
      - label: "Order"
        name: "order"
        widget: "number"
        default: 0
        required: false

  - name: "event-categories"
    label: "Event Categories"
    folder: "src/content/educational-process/event-categories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
      - label: "Order"
        name: "order"
        widget: "number"
        default: 0
        required: false

  - name: "static-pages"
    label: "Static Pages"
    folder: "src/content/static-pages"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
      - label: "Body"
        name: "body"
        widget: "markdown"

  - name: "contacts"
    label: "Contacts"
    folder: "src/content/settings"
    create: false
    extension: "md"
    format: "frontmatter"
    files:
      - label: "School Contacts"
        name: "school-contacts"
        file: "src/content/settings/contacts.md"
        fields:
          - label: "School Name"
            name: "schoolName"
            widget: "string"
          - label: "Address"
            name: "address"
            widget: "string"
          - label: "Main Phone"
            name: "phoneMain"
            widget: "string"
          - label: "Additional Phones"
            name: "phoneAdditional"
            widget: "list"
            required: false
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "Working Hours"
            name: "workingHours"
            widget: "markdown"
          - label: "Map URL or Iframe"
            name: "map"
            widget: "text"
            required: false
          - label: "Social Links"
            name: "socialLinks"
            widget: "list"
            required: false
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
              - label: "URL"
                name: "url"
                widget: "string"

  - name: "links"
    label: "Useful Links"
    folder: "src/content/public-info/links"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "URL"
        name: "url"
        widget: "string"
      - label: "Category"
        name: "category"
        widget: "string"
        required: false

  - name: "menu"
    label: "Menu (Food Schedule)"
    folder: "src/content/schedule/menu"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Date Range"
        name: "dateRange"
        widget: "string"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"

  - name: "work-schedule"
    label: "Work Schedule"
    folder: "src/content/schedule/work-schedule"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Body"
        name: "body"
        widget: "markdown"